services:

  landing:
    image: nginx:alpine
    container_name: landing
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 8088:80
    networks:
      - carrnet
    restart: unless-stopped

networks:
  carrnet:
    external: true
