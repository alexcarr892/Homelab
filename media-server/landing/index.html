<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carr Media</title>

  <style>
    :root{
      --bg0:#05060a;
      --bg1:#0b0f1a;
      --card:#0f1422cc;
      --border:rgba(255,255,255,.10);
      --border2:rgba(255,255,255,.22);
      --text:#f4f6ff;
      --muted:rgba(244,246,255,.70);
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html,body { height: 100%; }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Arial;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 20% 20%, rgba(89,135,255,.18), transparent 60%),
        radial-gradient(900px 500px at 80% 30%, rgba(255,140,89,.14), transparent 65%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      display: grid;
      place-items: center;
    }

    .card{
      width: min(820px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 22px;
      position: relative;
    }

    /* Rickroll button */
    .easter-egg{
      position: absolute;
      top: 14px;
      right: 14px;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: rgba(244,246,255,.7);
      cursor: pointer;
      transition: all .15s ease;
      z-index: 5;
    }
    .easter-egg:hover{
      background: rgba(255,255,255,.1);
      border-color: var(--border2);
      color: #fff;
      transform: translateY(-1px);
    }

    header{
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .logo{
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(89,135,255,.4), rgba(255,140,89,.3));
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    h1{
      margin: 0;
      font-size: 24px;
    }
    p{
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .grid{
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 620px){
      .grid{ grid-template-columns: 1fr 1fr; }
    }

    .btn{
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      text-decoration: none;
      color: inherit;
      transition: all .15s ease;
    }
    .btn:hover{
      background: rgba(255,255,255,.07);
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    .icon{
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.25);
      display: grid;
      place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .label{
      font-weight: 700;
      font-size: 18px;
    }
    .sub{
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }

    footer{
      margin-top: 18px;
      font-size: 12px;
      color: rgba(244,246,255,.55);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;}
    .pill{
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.03);
    }

    /* Rickroll overlay */
    #rick-overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(4px);
      display: none;
      place-items: center;
      z-index: 999;
    }
    #rick-overlay.active{
      display: grid;
    }
    #rick-box{
      width: min(720px, 92vw);
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    #rick-box iframe{
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Rickroll trigger -->
    <div class="easter-egg" onclick="openRick()" title="Totally harmless music note">
      🎵
    </div>

    <header>
      <div class="logo">▶</div>
      <div>
        <h1>Carr Media</h1>
        <p>Select an option to continue</p>
      </div>
    </header>

    <div class="grid">
      <a class="btn" href="https://jellyfin.carrmedia.net">
        <div class="icon">📺</div>
        <div>
          <div class="label">Watch</div>
          <div class="sub">Jellyfin – Movies • TV</div>
        </div>
      </a>

      <a class="btn" href="https://requests.carrmedia.net">
        <div class="icon">➕</div>
        <div>
          <div class="label">Request</div>
          <div class="sub">Jellyseerr – Ask for new content</div>
        </div>
      </a>
    </div>

    <footer>
      <div class="pill">Secure via Cloudflare</div>
      <div class="pill">Bookmark this page</div>
    </footer>

  </div>

  <!-- Rickroll overlay -->
  <div id="rick-overlay" onclick="closeRick()">
    <div id="rick-box" onclick="event.stopPropagation()">
      <iframe
        src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0"
        title="Rick Astley - Never Gonna Give You Up"
        allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script>
    function openRick(){
      document.getElementById('rick-overlay').classList.add('active');
    }
    function closeRick(){
      document.getElementById('rick-overlay').classList.remove('active');
    }
  </script>

</body>
</html>
