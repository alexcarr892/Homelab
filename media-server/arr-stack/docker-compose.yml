services:

  # -----------------------------------------------------------------------------
  # Media Server
  # -----------------------------------------------------------------------------

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: 1000:1000
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - /mnt/storage/jellyfin/config:/config
      - jellyfin-cache:/cache
      - /mnt/storage/media:/media
    ports:
      - 8096:8096
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - TZ=America/Chicago
      - LOG_LEVEL=info
    volumes:
      - /home/USER/docker/infra/jellyseerr/config:/app/config
    ports:
      - 5055:5055
    restart: unless-stopped

  # -----------------------------------------------------------------------------
  # VPN + Download Client
  # -----------------------------------------------------------------------------

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    volumes:
      - /home/USER/vpn/proton/wg0.conf:/gluetun/wireguard/wg0.conf:ro
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - FIREWALL=on
      - FIREWALL_OUTBOUND_SUBNETS=10.0.0.0/24
      - DNS_ADDRESS=1.1.1.1
      - TZ=America/Chicago
      - LOG_LEVEL=info
    ports:
      - 8090:8080  # qBittorrent WebUI
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - WEBUI_PORT=8080
    volumes:
      - /home/USER/docker/torrents/qbittorrent/config:/config
      - /mnt/storage/downloads:/downloads
    restart: unless-stopped

  # -----------------------------------------------------------------------------
  # Arr Stack
  # -----------------------------------------------------------------------------

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /home/USER/docker/torrents/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /home/USER/docker/torrents/sonarr:/config
      - /mnt/storage/media:/mnt/storage/media
      - /mnt/storage/downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /home/USER/docker/torrents/radarr:/config
      - /mnt/storage/media:/mnt/storage/media
      - /mnt/storage/downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /home/USER/docker/bazarr/config:/config
      - /mnt/storage/media:/media
    ports:
      - 6767:6767
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=America/Chicago
    restart: unless-stopped

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------

volumes:
  jellyfin-cache:
